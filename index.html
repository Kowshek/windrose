<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Windrose: Analyst-grade monitoring of Europe</title>
    <meta name="description" content="Analyst-grade monitoring of Europe, triaged, assessed, and sourced by a published methodology, at a price a student can pay." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      html, body {
        background: #05070d;
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100%;
        overflow-x: hidden;
      }
      #boot {
        position: fixed;
        inset: 0;
        background: #05070d;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 16px;
        opacity: 1;
        transition: opacity 500ms cubic-bezier(0.22, 1, 0.36, 1);
      }
      #boot-text {
        font-family: 'Instrument Serif', serif;
        font-style: italic;
        font-size: 28px;
        color: #ffffff;
        animation: bootPulse 2s infinite ease-in-out;
      }
      #boot-track {
        width: 120px;
        height: 1px;
        background: rgba(255, 255, 255, 0.1);
        position: relative;
        overflow: hidden;
      }
      #boot-bar {
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        width: 0%;
        background: #ffffff;
        animation: bootFill 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }
      @keyframes bootPulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      @keyframes bootFill {
        to { width: 100%; }
      }
    </style>
  </head>
  <body>
    <div id="boot">
      <div id="boot-text">Windrose</div>
      <div id="boot-track">
        <div id="boot-bar"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
